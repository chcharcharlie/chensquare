name: Sync Balatro

on:
  repository_dispatch:
    types: [balatro-updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest balatro/index.html from balatro-web
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/chcharcharlie/balatro-web/main/index.html \
            -o balatro/index.html

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet balatro/index.html || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add balatro/index.html
          git commit -m "Auto-sync: update balatro from balatro-web"
          git push
